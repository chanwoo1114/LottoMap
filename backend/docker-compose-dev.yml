services:
  db:
    image: postgis/postgis:16-3.4
    container_name: lotto-map-postgresql
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotto-map-api
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lotto-map-bootstrap
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
      LOTTO_LATEST: ${LOTTO_LATEST:-1189}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "python -m app.jobs.bootstrap
      --lotto-latest $$LOTTO_LATEST
      --continue-on-error"

volumes:
  pgdata: